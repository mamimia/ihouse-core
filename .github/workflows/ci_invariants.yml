name: CI Invariants

on:
  pull_request:
    branches: ["main"]

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: PR metadata gate
        run: scripts/ci/check_pr_metadata.sh PR_METADATA.txt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip pytest

      - name: Run invariant suite
        run: |
          source .venv/bin/activate
          IHOUSE_ALLOW_SQLITE=1 PYTHONPATH=src python3 -m pytest tests/invariants -q
