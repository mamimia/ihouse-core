name: ihouse-ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install -U pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          python -m pip install -U pytest

      - name: Ensure canonical scripts exist
        run: |
          test -f scripts/run_api.sh
          test -f scripts/dev/smoke_http.sh
          test -f scripts/dev/curl_event.sh

      - name: Run unit and contract tests
        run: |
          source .venv/bin/activate
          # SQLite invariant tests excluded — require IHOUSE_ALLOW_SQLITE=1 (local only)
          # E2E Supabase tests excluded — require live secrets (manual trigger only)
          PYTHONPATH=src python -m pytest -q \
            --ignore=tests/invariants \
            --ignore=tests/test_booking_amended_e2e.py

      - name: Boot API and run HTTP smoke
        # Only runs when IHOUSE_API_KEY secret is configured in this repo
        if: ${{ secrets.IHOUSE_API_KEY != '' }}
        env:
          IHOUSE_API_KEY: ${{ secrets.IHOUSE_API_KEY }}
        run: |
          source .venv/bin/activate
          export PYTHONPATH=src

          ./scripts/run_api.sh > api.log 2>&1 &
          API_PID=$!

          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 1
          done

          BASE_URL=http://127.0.0.1:8000 IHOUSE_API_KEY="$IHOUSE_API_KEY" ./scripts/dev/smoke_http.sh

          kill $API_PID
