name: ihouse-ci

on:
  push:
  pull_request:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -U pytest

      - name: Ensure canonical scripts exist
        run: |
          test -f scripts/run_api.sh
          test -f scripts/dev/smoke_http.sh
          test -f scripts/dev/curl_event.sh

      - name: Run unit and contract tests
        env:
          PYTHONPATH: src
          # IHOUSE_JWT_SECRET must be set — tests that parse JWTs require it
          IHOUSE_JWT_SECRET: "test-jwt-secret-that-is-long-enough-32chars"
        run: |
          # pytest.ini already sets: addopts = -q --ignore=tests/invariants --ignore=tests/deprecated
          # Only add the e2e ignores (require live Supabase secrets)
          python -m pytest \
            --ignore=tests/test_booking_amended_e2e.py \
            --ignore=tests/test_e2e_integration_harness.py \
            -v --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check (report only)
        # Non-blocking: ruff reports issues but does not fail CI until a
        # clean baseline is established (future phase).
        run: ruff check src/ --output-format=github || true

      - name: Run ruff format check (report only)
        run: ruff format src/ --check --diff || true

  smoke:
    name: HTTP Smoke Test
    runs-on: ubuntu-latest
    # Only runs when IHOUSE_API_KEY secret is configured in this repo
    if: ${{ secrets.IHOUSE_API_KEY != '' }}
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt

      - name: Boot API and run HTTP smoke
        env:
          IHOUSE_API_KEY: ${{ secrets.IHOUSE_API_KEY }}
          PYTHONPATH: src
        run: |
          ./scripts/run_api.sh > api.log 2>&1 &
          API_PID=$!

          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 1
          done

          BASE_URL=http://127.0.0.1:8000 IHOUSE_API_KEY="$IHOUSE_API_KEY" ./scripts/dev/smoke_http.sh

          kill $API_PID
