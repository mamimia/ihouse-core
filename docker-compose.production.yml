# =============================================================================
# iHouse Core — Production Docker Compose
# Phase 313 — Production Readiness Hardening
# =============================================================================
#
# Production-hardened compose file.
# Differs from docker-compose.yml:
#   - workers=4 (vs 2 in dev)
#   - restart: always (vs unless-stopped)
#   - read_only filesystem + tmpfs for writable dirs
#   - no-new-privileges security option
#   - tighter memory limits (1GB limit vs 512M dev)
#   - structured JSON logging
#   - explicit IHOUSE_ENV=production
#   - IHOUSE_DEV_MODE not set (disabled)
#   - CORS configured for production domain
#   - Frontend Next.js service included
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#   docker compose -f docker-compose.production.yml ps
#   docker compose -f docker-compose.production.yml logs -f api
#   docker compose -f docker-compose.production.yml down
#
# Required: .env file with all production secrets (see .env.production.example)
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ihouse-core:production
    container_name: ihouse-core-api-prod
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - IHOUSE_ENV=production
      - PORT=8000
      - UVICORN_WORKERS=4
      # Explicitly disable dev mode in production
      - IHOUSE_DEV_MODE=false
      # CORS for frontend — set in .env for your domain
      - IHOUSE_CORS_ORIGINS=${IHOUSE_CORS_ORIGINS:-https://app.domaniqo.com}
      # Phase 359 — Dynamic version label for /health and OpenAPI
      - BUILD_VERSION=${BUILD_VERSION:-0.1.0}

    # Always restart on crash — production reliability
    restart: always

    # Health check — tighter timing for production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

    # Resource limits — production sizing
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    # Security hardening
    security_opt:
      - no-new-privileges:true

    # Read-only filesystem — prevents container writes to host layers
    # tmpfs provides writable space for Python runtime needs
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /run:noexec,nosuid,size=16m

    # Structured JSON logging for production log aggregation
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
        labels: "service=ihouse-core,env=production"

    # Labels for reverse proxy / service discovery
    labels:
      - "com.ihouse.service=api"
      - "com.ihouse.env=production"
      - "com.ihouse.version=${BUILD_VERSION:-latest}"

  # ---------------------------------------------------------------------------
  # Frontend — Next.js (Phase 313)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./ihouse-ui
      dockerfile: Dockerfile
    image: ihouse-ui:production
    container_name: ihouse-core-frontend-prod
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      - "com.ihouse.service=frontend"
      - "com.ihouse.env=production"
      - "com.ihouse.version=${BUILD_VERSION:-latest}"
