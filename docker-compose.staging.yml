# =============================================================================
# iHouse Core — Docker Compose (Staging)
# Phase 468 — Staging Deploy (updated from Phase 237)
# =============================================================================
#
# Staging environment — near-production but with safety guards.
# Differs from production:
#   - workers=2 (vs 4 in prod)
#   - IHOUSE_DRY_RUN=true (no real outbound API calls)
#   - Looser memory limits
#   - Port 8001 (vs 8000 prod)
#   - Frontend included
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d
#   docker compose -f docker-compose.staging.yml logs -f api
#   docker compose -f docker-compose.staging.yml run tests
#   docker compose -f docker-compose.staging.yml down
#
# Required: .env.staging or .env with staging secrets
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ihouse-core:staging
    container_name: ihouse-core-staging-api
    ports:
      - "${PORT:-8001}:8000"
    env_file:
      - .env.staging
    environment:
      - IHOUSE_ENV=staging
      - PORT=8000
      - UVICORN_WORKERS=2
      - IHOUSE_DEV_MODE=false
      - IHOUSE_DRY_RUN=true
      - IHOUSE_CORS_ORIGINS=${IHOUSE_CORS_ORIGINS:-http://localhost:3000}
      - IHOUSE_BOOTSTRAP_SECRET=${IHOUSE_BOOTSTRAP_SECRET:-}
      - BUILD_VERSION=${BUILD_VERSION:-0.1.0-staging}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    labels:
      - "com.ihouse.service=api"
      - "com.ihouse.env=staging"

  frontend:
    build:
      context: ./ihouse-ui
      dockerfile: Dockerfile
    image: ihouse-ui:staging
    container_name: ihouse-core-frontend-staging
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"
    labels:
      - "com.ihouse.service=frontend"
      - "com.ihouse.env=staging"

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ihouse-core-staging-tests
    env_file:
      - .env.staging
    environment:
      - IHOUSE_ENV=staging
    command:
      - "python"
      - "-m"
      - "pytest"
      - "tests/integration/"
      - "-v"
      - "--tb=short"
      - "-m"
      - "integration"
    depends_on:
      api:
        condition: service_healthy
